    - name: AI 代码编程
      links:
        - title: Cursor
          url: https://www.cursor.so/
          logo: cursor.png
          description: Cursor 是由 Anysphere 公司开发的人工智能编程助手，基于大语言模型提供代码补全、解释、重构与自然语言生成函数功能，支持接入 GPT-4o、Claude 3.7 Sonnet 等外部模型。作为推动“氛围编程”范式的代表性初创公司之一，该工具采用 Electron+CodeMirror 架构，内置 LSP 语言服务和 Chat 交互模块，集成自研 cursor-small 模型及多款第三方模型，通过 Composer 试验性功能实现多文件协同编辑与多智能体协作，引入 Claude 模型将代码补全速度提升两倍。到 2025 年初，该工具已成为 GitHub Copilot 的竞争对手之一，Visa、Reddit 等企业在招聘中明确要求具备 Cursor 操作经验
        - title: Codex
          url: https://openai.com/codex/
          logo: codex.png
          description: Codex 是 2025 年 10 月 OpenAI 公司开发的 AI 代码生成训练模型，基于 GPT-3 架构改进，专注于将自然语言指令转换为多种编程语言代码。该模型通过混合训练自然语言和公开代码数据构建，采用 Transformer 架构并具备 14KB 代码记忆容量，支持 Python、JavaScript、Java 等主流语言，作为 GitHub Copilot 的技术基础，核心功能包括代码生成、补全优化及多语言翻译。2025 年 5 月升级为云端软件工程代理后，新增并行处理代码编写、调试和测试功能，集成至 ChatGPT 生态并向企业用户开放。同年 6 月通过 ChatGPT Codex 子系统实现多方案生成功能，允许用户为单一任务获取多个代码方案并自主选择最优解
        - title: Claude Code
          url: https://claude.com/product/claude-code
          logo: claude.png
          description: Claude 是由美国人工智能公司 Anthropic 开发的大型语言模型家族，2023 年 3 月 15 日发布初代版本，创始团队包含 OpenAI 前核心成员及 GPT-3 开发人员。该模型采用 Constitutional AI 训练方法，支持多模态处理、代码生成及跨模态推理，并注重安全性与伦理规范
        - title: Trae
          url: https://www.trae.cn/
          logo: trae.png
          description: Trae 是字节跳动发布的 AI 原生编程工具。2025 年 1 月 19 日，字节跳动发布了一款面向专业的开发者提供服务的全新 AI Coding 产品 Trae。该工具本质上是 AI 原生集成开发环境工具，支持实时续写代码、智能排查 Bug、自动构建项目、一键预览效果、解答技术难题等，内置 Builder 模式、侧边对话（Chat 模式）和内嵌对话功能，可帮助开发者从 0 到 1 开发完整项目。国内版针对中国开发场景和习惯进行优化，支持用户自定义接入大模型 API
        - title: Grok
          url: https://grok.com/
          logo: grok.png
          description: Grok 是由埃隆·马斯克旗下 xAI 公司开发的人工智能大模型系列，首发布于 2023 年 11 月，其命名源自科幻经典《异乡异客》，寓意深度理解。该模型通过 3140 亿参数的混合专家架构，在数学推理（HumanEval 达 63.2%）和代码生成领域超越了GPT-3.5，并搭载实时联网功能，可直接访问 X 平台数据。其标志性幽默应答风格借鉴《银河系漫游指南》，支持多模态交互与记忆功能
        - title: v0
          url: https://v0.dev/
          logo: v0.jpg
          description: v0 是由 Vercel 推出的一款 AI 代码生成工具，可以快速生成前端组件代码
        - title: Copilot
          url: https://github.com/features/copilot
          logo: copilot.png
          description: GitHub Copilot 是 GitHub 与 OpenAI 共同推出的一款 AI 编程工具，它基于 GitHub 及其他网站的源代码，可根据上文提示为程序员自动编写下文代码
        - title: CodeGeeX
          url: https://codegeex.cn/
          logo: codegeex.png
          description: CodeGeeX 是清华和智谱 AI 联合打造的多语言代码生成模型，基于 Transformer 架构设计，采用自回归解码器机制，使用华为 MindSpore 框架在昇腾 910 AI 处理器集群完成训练。模型包含 40 层自注意力机制，最大支持 2048 序列长度，训练数据融合 The Pile、CodeParrot 等开源代码数据集，总语料规模达 1587 亿标识符
        - title: 通义灵码
          url: https://tongyi.aliyun.com/lingma/
          logo: qianwen.png
          description: 通义灵码是由阿里云提供的智能编码辅助工具，提供代码智能生成、智能问答、多文件修改、编程智能体等能力，为开发者带来智能化研发体验，引领 AI 原生研发新范式
        - title: Browse AI
          url: https://www.browse.ai/
          logo: browse.png
          description: Browse AI 是一个网页数据抓取和监控爬虫工具，可以让你在几分钟内训练一个机器人，从任何网站提取你需要的数据，并且无需编写任何代码。你可以将抓取到的数据保存为电子表格，或者通过 API，Google Sheets，Zapier 等方式与其他应用程序集成
