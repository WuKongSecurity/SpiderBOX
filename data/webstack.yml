    - name: 正版书籍
      links:
        - title: Python3 网络爬虫开发实战（第2版）
          logo: book_13527222.jpg
          url: https://item.jd.com/13527222.html
          description: 崔庆才著，本书介绍了如何利用 Python 3 开发网络爬虫。本书为第 2 版，相比于第 1 版，为每个知识点的实战项目配备了针对性的练习平台，避免了案例过期的问题。另外，主要增加了异步爬虫、JavaScript 逆向、App 逆向、页面智能解析、深度学习识别验证码、Kubernetes 运维及部署等知识点，同时也对各个爬虫知识点涉及的请求、存储、解析、测试等工具进行了丰富和更新
        - title: Python3 反爬虫原理与绕过实战
          logo: book_12794078.jpg
          url: https://item.jd.com/12794078.html
          description: 韦世东著，本书首先介绍了开发环境的配置，接着讨论了 Web 网站的构成和页面渲染、动态网页和静态网页对爬虫造成的影响，紧接着详细介绍了信息校验型反爬虫、动态渲染反爬虫、文本混淆反爬虫知识、特征识别反爬虫的原理、实现和绕过，然后概览了 App 数据爬取的关键和常用的反爬虫手段，最后介绍了常见的编码和加密原理、JavaScript 代码混淆知识、前端禁止事件以及与爬虫相关的法律知识和风险点
        - title: 爬虫逆向进阶实战
          logo: book_13142571.jpg
          url: https://item.jd.com/13142571.html
          description: 李玺著，本书以爬虫逆向方向的相关技术和岗位要求进行撰写，总结了爬虫的架构体系、主流框架和未来发展ꎮ 书中包括各种自动化工具、抓包工具、逆向工具的使用，核心内容以 Web Js 逆向、安卓逆向、小程序逆向为主。结合三十多个实战案例进行分析，内容从易到难，循序渐进，另外还对主流的反爬虫技术进行了讲解，包括传输协议、验证码体系、字符集映射、行为和指纹等
        - title: 反爬虫 AST 原理与还原混淆实战
          logo: book_10099859383510.jpg
          url: https://item.jd.com/10099859383510.html
          description: 李岳阳（网名如意），卓斌（网名小肩膀）著，本书从 AST 这一个知识点出发，由浅入深，带领读者掌握反爬虫 AST 的原理，并帮助读者培养解决实际问题的能力。本书共 11 章，分为四部分，首部分（第1～4章）介绍开发环境的搭建方法、Web 调试的必备技巧以及爬虫与反爬虫的基本知识；第二部分（第5～6章）讲解混淆 JavaScript 代码的手工逆向方法与 JavaScript 代码安全防护的原理；第三部分（第7～8章）讲解 AST 的原理与API的使用方法；第四部分（第9～11章）以 AST 为基础，讲解自动化的 JavaScript 代码防护与还原方案，并带领读者进行实战训练
        - title: 安卓 Frida 逆向与抓包实战
          logo: book_10116371577375.jpg
          url: https://item.jd.com/10116371577375.html
          description: 陈佳林（网名 r0ysue）著，本书以详细介绍了 Hook 框架 Frida 在安卓逆向工程与抓包中的应用，主要内容包括如何搭建完美运行 Frida 的安卓逆向分析环境，使用 Frida 对安卓 App 各项组件、框架和代码进行 Hook，如何批量自动化 Hook，以及全自动导出结果。针对爬虫工程师最为迫切需要的抓包技术，详细阐述了各种应用层框架的抓包实战，HTTP(S) 及其框架抓包的核心原理及工具使用，通过 Frida 进行的 Hook 抓包，还进一步介绍了 Frida 对 native 层的Hook,以及一系列“通杀”“自吐”脚本的研发过程和核心原理。本书内容详尽，突出实操，适合安卓开发人员，安卓应用安全工程师，逆向分析工程师，爬虫工程师，以及大数据分析工程师和安全研究人员使用
        - title: 安卓 Frida 逆向与协议分析
          logo: book_10116544664043.jpg
          url: https://item.jd.com/10116544664043.html
          description: 陈佳林（网名 r0ysue）著，本书翔实地介绍流行的 Frida 工具在安卓逆向工程中的应用，内容包括：如何安装和使用 Frida、基本环境的搭建、Frida-tools、Frida 脚本、Frida API、批量自动化 Trace 和分析、RPC 远程方法调用、在无须逆向算法具体实现的情况下对 Frida 工具的调用，并提供了大量 App 逆向与协议分析案例，书中还介绍了更加稳定的 Xposod 框架的使用方法，以及从安卓源码开始定制属于自己的抓包沙箱，打造无法被绕过的抓包环境等内容。本书案例丰富，注重实操，适合安卓应用安全工程师、安卓逆向分析工程师、爬虫工程师以及大数据采集和分析工程师使用
