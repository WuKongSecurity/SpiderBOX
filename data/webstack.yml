    - name: AI 图像视频
      links:
        - title: Nano Banana
          url: https://nanobanana.io/
          logo: nanobanana.png
          description: Nano Banana 是‌谷歌开发的一款 AI 图像生成与编辑模型‌，其正式技术名称为 Gemini 2.5 Flash Image‌（初代）及后续升级版本 Gemini 3.1 Flash Image，它不仅能融合多张图片拼接出全新画面，还能理解地理、建筑与物理结构，甚至将二维地图转化为三维景观
        - title: 即梦 AI
