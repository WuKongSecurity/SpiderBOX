        - title: ElevenLabs
          url: https://elevenlabs.io/
          logo: elevenlabs.png
          description: ElevenLabs 是于 2022 年创立的英国人工智能公司，总部位于伦敦，专注于开发文本转语音（TTS）、语音克隆及 AI 音频生成技术。2026 年 1 月，其被列为营收排名前十的“原生人工智能”企业之一。 其核心产品包括支持 29 种语言（后扩展至 70 种）的语音合成模型 Eleven v3，可通过情感标签控制语调，并提供语音克隆、AI 配音、多角色对话生成等功能，应用于有声读物、游戏配音、多语言本地化等领域
        - title: IndexTTS2
          url: https://indextts2.org/
          logo: indextts2.png
          description: 情感表达与时长可控的自回归零样本语音合成突破，创新性地提出了一种通用且适用于自回归模型的语音时长控制方法。该方法支持两种生成模式：一种可显式指定生成 token 数量以精确控制语音时长；另一种则自由自回归生成语音，同时忠实还原输入提示的韵律特征。此外，IndexTTS2 实现了情感表达与说话人身份的解耦，可独立控制音色和情感。在零样本设置下，模型能准确复刻目标音色（来自音色提示），同时完美还原指定的情感语调（来自风格提示）
        - title: Suno
          url: https://suno.com/
          logo: suno.png
          description: Suno AI 是一款AI音乐创作平台，由机器学习专家 Mikey Shulman、Keenan Freyberg、Georg Kucsko 和 Martin Camacho 共同创立，创始团队位于麻省剑桥，曾开发文本转语音程序 Bark，后转向音乐生成领域。2024 年 3 月推出 V3 音乐生成模型，支持通过歌词生成歌曲并指定AI歌手音色，新增 Custom Mode（自定义模式）和 Instrumental（纯音乐模式），可在数秒内生成 2 分钟高质量音频
        - title: Udio
          url: https://www.udio.com/
          logo: udio.jpg
          description: Udio 是一家专注于音乐生成领域的生成式人工智能初创公司，由前谷歌 DeepMind 研究人员团队于 2023 年创立，总部位于美国加利福尼亚州。该公司核心产品为 AI 音乐生成平台，用户可通过输入文本提示快速生成包含歌词、人声及伴奏的完整音乐作品，支持多语言创作、流派选择及歌曲延长功能，测试阶段提供每月 1200 首免费生成额度。2024 年 4 月完成种子轮融资 1000 万美元，主要投资方包括 Andreessen Horowitz（a16z）、Instagram 联合创始人迈克·克里格及音乐人 will.i.am 等。2024 年 7 月推出的 Udio v1.5 版本升级至 48kHz 立体声音轨，新增音调控制、音轨拆分及音频重混功能，提升乐器分离度与音乐性，同期发布可视化编辑工具 Sessions，支持创作者移动、扩展或替换歌曲的主歌、副歌等结构部分
        - title: Stable Audio
