        - title: 移动安全攻防进阶 — Android 与 iOS 逆向理论与案例实战
          logo: book_14365942.jpg
          url: https://item.jd.com/14365942.html
          description: 叶绍琛，陈鑫杰，蔡国兆著，本书从 Android 虚拟机的技术原理开始，着重解析了 Java 层 Dalvik 虚拟机和 ART 虚拟机的 Android 系统中的运行机制，从而引出 Native 层的 Native 开发和 ARM 汇编语言等更底层的技术栈。在攻防全局观上主要介绍 ATT&CK 框架的技战术，将攻防过程中的技术点映射到矩阵中，ATT&CK 框架中的移动安全攻防框架可以作为移动安全攻防的全局指导。通过对移动应用第一代加固壳到第三代加固壳的技术原理的剖析及技术实现的讲解，可以看到攻防对抗逐渐走向底层的原生层，通过学习基于 OLLVM 的加固壳开发以及 VMP 加固壳的代码实现，全面掌握主流应用加固的技术方案。通过对真实世界实网攻防中遭遇的恶意程序、APT 攻击样本等进行逆向分析，详细介绍其中的技术原理和代码实现，以帮助读者从一线攻防案例中获取攻防对抗经验
