          logo: jimeng.png
          description: 即梦 AI 是由字节跳动旗下剪映团队于2024年3月开启内测的生成式人工智能创作平台，原名为剪映 Dreamina，2024年5月正式定名为中文品牌"即梦"。该平台整合文生图、图生图、文生视频及图生视频等核心功能，依托自研 Seedream 和 Seedance 模型架构，实现动态海报生成、动作模仿等创新功能，用户群体覆盖专业设计师、视频创作者及普通消费者
        - title: 豆包
          url: https://www.doubao.com/chat/
          logo: doubao.jpg
          description: 豆包是字节跳动基于豆包大模型（原云雀）开发的 AI 助手。提供聊天机器人、写作助手以及英语学习助手等功能，它可以回答各种问题并进行对话，帮助人们获取信息
        - title: Midjourney
          url: https://www.midjourney.com/
          logo: midjourney.png
          description: Midjourney 是一款 AI 制图工具，只要关键字，就能透过 AI 算法生成相对应的图片，只需要不到一分钟。可以选择不同画家的艺术风格，例如安迪华荷、达芬奇、达利和毕加索等，还能识别特定镜头或摄影术语
        - title: Veo
          url: https://aistudio.google.com/models/veo-3
          logo: veo.png
          description: Veo 是由谷歌公司开发的 AI 视频生成模型，于 2024 年 5 月 14 日在美国 I/O 开发者大会正式发布。该模型支持通过文本或图像输入生成超过 60 秒的 1080P 高清视频，用户可自定义光照、镜头语言等参数，生成效果被视为对标 OpenAI 的 Sora 模型。2025 年 5 月 21 日，谷歌发布第三代模型 Veo 3，接入 Gemini 平台并向全球 159 个市场开放。2025 年 10 月，谷歌推出 Veo 3.1，提升了叙事控制、音频融合与画面真实感。此外，Veo 2 模型于 2025 年 12月 被应用于机器人策略评估系统
        - title: Sora
          url: https://sora.chatgpt.com/explore
          logo: sora.png
          description: Sora 是由美国人工智能研究公司 OpenAI 发布的人工智能文生视频大模型（但 OpenAI 并未单纯将其视为视频模型，而是作为“世界模拟器”），于 2024 年 2 月 15 日（美国当地时间）正式对外发布。当地时间 2025 年 9 月 30 日，OpenAI 发布视频生成模型 Sora 2 并推出 iOS 社交应用 Sora
        - title: DALL·E
          url: https://openai.com/index/dall-e-3/
          # logo: labs.png
          logo: dall-e.png
          description: DALL·E 是 OpenAI 发布的一个用文本生成图像的模型，2023 年 9 月推出的 DALL·E 3 版本通过与 ChatGPT 深度集成，实现了自然语言对话生成图像的功能优化，支持用户通过对话调整图像细节并自动生成精准提示词。该版本新增了限制暴力内容生成、禁止模仿艺术家风格等安全机制，同时允许创作者自主决定作品是否用于 AI 训练
        - title: 可灵
          url: https://app.klingai.com/
          logo: klingai.png
          description: 可灵（KLING）是快手 AI 团队自主研发的视频生成大模型，2024 年 6 月正式上线，支持生成 1080p 分辨率、最长 2 分钟的视频并兼容自由宽高比，技术路线对标 Sora，采用 3D 时空联合注意力机制实现对复杂时空运动和物理规律的建模。该模型基于快手视频技术积累，通过文生视频、图生视频等功能实现静态图像动态化，并提供视频续写、多模态编辑等创作工具
        - title: 海螺
          url: https://hailuoai.com/
          logo: hailuoai.png
          description: 海螺 AI（Hailuo AI）是一个基于先进的 AI 生成技术打造的对话式智能助理，由被称为“大模型四小龙”的 MiniMax 公司开发，海螺 AI 具备多模态交互能力，能够提供语音通话、文本交互、图像识别等功能。在海螺 AI，用户可以实现文生视频和图生视频，相比同类产品，海螺的生成画质逼真，电影级运镜算是一个亮点
        - title: Vidu
          url: https://www.vidu.cn/
          logo: vidu.jpg
          description: Vidu 是北京生数科技有限公司联合清华大学于 2024 年 4 月 27 日发布的中国首个长时长、高一致性、高动态性视频大模型，采用全球首个 Diffusion 与 Transformer 融合的 U-ViT 架构（早于 Sora 的 DiT 方案），初始版本支持生成 4 秒、8 秒的高动态性视频（分辨率达 1080P），首批功能包括文生视频、图生视频及参考生视频。该模型可精确模拟物理规律生成光影、人物表情等细节，支持多镜头切换及中国元素融合
        - title: 通义万相
          url: https://wanxiang.aliyun.com/
          logo: qianwen.png
          description: 通义万相是阿里云通义大模型旗下的 AI 绘画创作模型，由阿里巴巴研发，基于组合式生成模型 Composer 构建，视觉生成大模型通过原生多模态统一框架进行训练，具备图像、视频、声音等多模态生成能力。在画面质量、语义理解、运动幅度、物理规律遵循、艺术质感能力上均达到领先水平
        - title: 万相营造
          url: https://agi.taobao.com/
          logo: qianwen.png
          description: 万相营造是阿里旗下推出的基于大模型技术进行多模态智能创意生成的平台，支持广告推广、运营、设计，根据既有的货品素材、营销运营诉求进行 AI 创意生成。用户可以根据需求，制作包括商品图、服饰模特图、服饰平铺图上身试穿、家居图、一键图文、营销文案、营销脚本及视频生成。同时提供设计师常用的多种 AI 工具能力，协助设计师快速完成扩图、抠图、图像高清处理等日常基础工作
        - title: 腾讯混元 AI 视频
          url: https://video.hunyuan.tencent.com/
          logo: hunyuan.png
          description: 腾讯混元 AI 视频是腾讯推出的强大的AI视频生成工具，具备高度的创新性和实用性。用户可以通过平台生成高质量的视频内容，支持创意视频制作、特效生成，动画与游戏开发，满足多样化的需求。用户可以通过上传一张图片进行简短描述，让图片动起来生成5秒的短视频。支持对口型、动作驱动和背景音效自动生成等功能。能根据文本提示生成相应的视频内容。在画质、物体运动、镜头切换等方面表现出色，能理解和遵循复杂的提示词，生成具有大片质感的视频
        - title: Runway
          url: https://runwayml.com/
          logo: runwayml.png
          description: Runway 是一家应用人工智能研究公司，2018 年由 Cristóbal Valenzuela 等人在纽约创立，总部位于纽约。该公司致力于塑造艺术、娱乐和人类创造力的下一个时代，专注于人工智能在创意领域的应用，提供视频生成、图像处理、3D 内容创作等 30 余种 AI 工具。核心产品包括 Gen 系列视频模型，其 Gen-2 模型实现文本生成视频，Gen-4 模型支持图像转电影级视频
        - title: Z-Image
          url: https://github.com/Tongyi-MAI/Z-Image
          logo: qianwen.png
          description: Z-Image 是阿里云通义于 2026 年 1 月 28 日开源发布的图像生成基座模型，参数规模为 60 亿(6B)，属于非蒸馏原生架构，完整保留权重分布，原生支持 CFG 引导机制，可作为 LoRA、ControlNet 等微调任务的训练底座。该模型支持生成包括写实、动漫与数字艺术在内的多种图像风格，并通过优化采样空间分布减少生成图像的“同质化”问题。其采用单流扩散 Transformer(S3-DiT) 架构，并推出了 Z-Image-Turbo 等优化版本。Turbo 版本通过解耦式蒸馏等技术实现仅需 8 步推理的实时生成，支持在 16GB 显存的消费级显卡上运行，在中英双语文本渲染方面表现突出
        - title: FLUX.2
          url: https://github.com/black-forest-labs/flux2
          logo: flux.png
          description: FLUX.2 是视觉智能实验室 Black Forest Labs 于 2025 年 11 月发布的新一代图像生成模型。是一个拥有 320 亿参数的整流流 Transformer 模型，能够根据文本指令生成、编辑和组合图像。它支持多参考图像生成功能，可保持角色与风格一致性，并支持高达 400 万像素的高分辨率图像处理。其系列包含 FLUX.2 [dev] 等版本，部分以开放权重形式提供
        - title: Flow
          url: https://labs.google/fx/tools/flow
          logo: flow.png
          description: Flow 是由谷歌公司于 2025 年 5 月 21 日在 I/O 开发者大会上发布的 AI 电影创作应用，面向美国地区用户开放。该工具整合了谷歌的 Veo 视频生成模型、Imagen 图像生成技术和 Gemini 自然语言处理能力，支持用户通过文字指令生成 8 秒音画同步视频片段，并提供镜头运动轨迹控制、场景延展及转场效果编辑等影视制作功能。Flow 采用订阅制服务模式，提供 Pro 和 Ultra 不同层级的服务
        - title: 云幕同声
          url: https://www.yunmuts.com/
          logo: yunmuts.png
          description: 云幕同声是新一代的 AI 视频翻译工具，使用最新的声音复刻模型实现高保真的 AI 视频翻译。在短剧出海领域的效果尤为优秀。98% 还原音色、优秀的音画同步算法、融入 AI 人声分离模型、支持后期效果精细调整
        - title: Civitai
          url: https://civitai.com/
          logo: civitai.png
          description: Civitai 是一个专注于稳定扩散（Stable Diffusion）AI 艺术模型的免费开源模型共享平台，提供检查点训练模型、LoRA 模型等多种类型，支持图像生成、自然语言处理、音频创作等领域的应用。用户可浏览、上传和下载模型，通过社区互动分享生成图片及提示词
        - title: Artlist
          url: https://artlist.io/
          logo: artlist.jpg
          description: Artlist 是一个面向创作者提供 AI 工具与数字资产的创意平台。该公司成立于 2016 年，总部位于以色列，以“让创作更自由”为使命。其通过订阅制模式，为用户提供海量的免版税音乐、音效及视频素材。核心资源包括涵盖多种风格的 2.8 万首歌曲、7.2 万+音效以及超过 100 万段高清视频素材。平台还提供 AI 图像生成、AI 语音合成等 AI 工具
        - title: Adobe Firefly
          url: https://firefly.adobe.com/
          logo: firefly.png
          description: Adobe Firefly 是 Adobe 公司推出的生成式人工智能软件，通过整合多模态生成技术，为创意工作者提供全链路的数字创作支持。该软件基于 Adobe 长达十年的 AI 技术积累（Adobe Sensei）开发，2022 年首次推出后持续迭代，至 2025 年升级为商业级全模态创作引擎。2023 年 9 月结束内测并开放商业使用。其核心功能包括文本生成图像/视频/音频、智能填充、矢量图形重构等，现深度集成于 Premiere Pro、Illustrator 等 Adobe Creative Cloud 应用程序中
